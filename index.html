<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最简单的HTML文件</title>
</head>
<body>
    <h1>你好，世界！</h1>
    <p>这是一个最简单的HTML文件。</p>
    <p>它包含了基础的HTML结构：</p>
    <ul>
        <li>文档类型声明</li>
        <li>html 根元素</li>
        <li>head 头部（含字符编码和视口设置）</li>
        <li>body 主体（含标题、段落和列表）</li>
    </ul>
    <p>你可以直接复制此代码，保存为 <code>.html</code> 文件，然后在浏览器中打开查看效果。</p>
</body>
</html>
